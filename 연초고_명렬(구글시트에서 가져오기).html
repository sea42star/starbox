<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 출석부 Pro (전화연결 버전)</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background: #f8f9fa; }
        body { display: flex; flex-direction: column; }
        header { padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        .tab-wrap { display: flex; gap: 6px; }
        .tab-btn { flex: 1; height: 45px; border: 1px solid #ddd; border-radius: 8px; font-weight: bold; cursor: pointer; background: #eee; display: flex; align-items: center; justify-content: center; }
        .tab-btn.active { background: #339af0; color: white; border-color: #1c7ed6; }
        main { flex-grow: 1; padding: 6px; display: flex; overflow: hidden; }
        .table-container { flex: 1; background: white; border: 1px solid #dee2e6; }
        table { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; }
        td { border: 1px solid #dee2e6; padding: 0; text-align: center; }
        .no-cell { width: 32px; background: #f1f3f5; color: #868e96; font-size: 11px; font-weight: bold; }
        
        /* [디자인] 옅은 노란색 + 학급 23px */
        .name-cell { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; background-color: #fffdeb; color: #333; -webkit-tap-highlight-color: transparent; }
        .mode-class .name-cell { font-size: 23px; }
        .mode-staff .name-cell { font-size: 14px; }
        
        .step-1 { background-color: #ffd43b !important; }
        .step-2 { background-color: #20c997 !important; color: white !important; }
        footer { padding: 10px; background: white; border-top: 1px solid #ddd; display: flex; gap: 8px; }
        .f-btn { flex: 1; height: 50px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div id="loading"><b>명렬표 및 연락처 로딩 중...</b></div>

<header>
    <div class="tab-wrap">
        <div id="t1" class="tab-btn active" onclick="setTab('class')">학급 명렬</div>
        <div id="t2" class="tab-btn" onclick="setTab('staff')">교직원 명렬</div>
    </div>
</header>

<main><div class="table-container"><table id="targetTable"></table></div></main>

<footer>
    <button class="f-btn" style="background:#ff6b6b" onclick="resetCheck()">초기화</button>
    <button class="f-btn" style="background:#37b24d" onclick="saveCheck()">저장하기</button>
</footer>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzs5zgRjXwrh69vZbf0zyr7bMLNA3dW3B9USRNLosbqLeJuju82j_5ghKnsXmHrlTed/exec';

    let DATA_STORAGE = { class: [], staff: [] };
    let nowMode = 'class';

    async function init() {
        try {
            const res = await fetch(API_URL);
            DATA_STORAGE = await res.json();
            document.getElementById('loading').style.display = 'none';
            render();
        } catch (e) {
            document.getElementById('loading').innerHTML = "<b>연동 실패!</b><br>배포 URL을 확인하세요.";
        }
    }

    function render() {
        const table = document.getElementById('targetTable');
        table.innerHTML = "";
        table.className = (nowMode === 'class' ? 'mode-class' : 'mode-staff');
        const data = DATA_STORAGE[nowMode];
        const rows = (nowMode === 'class' ? 10 : 20);
        const cols = (nowMode === 'class' ? 3 : 4);

        for (let r = 0; r < rows; r++) {
            const tr = document.createElement('tr');
            const tdNum = document.createElement('td');
            tdNum.className = 'no-cell';
            tdNum.innerText = r + 1;
            tr.appendChild(tdNum);

            for (let c = 0; c < cols; c++) {
                const tdName = document.createElement('td');
                const idx = r + (c * rows);
                
                if (data[idx]) {
                    const cell = document.createElement('div');
                    cell.className = 'name-cell';
                    cell.id = `${nowMode}-${idx}`;
                    cell.innerText = data[idx][0]; // 이름
                    cell.dataset.state = 0;

                    // [기능 1] 짧게 클릭: 체크 표시
                    cell.onclick = function() {
                        this.dataset.state = (parseInt(this.dataset.state) + 1) % 3;
                        updateColor(this);
                    };

                    // [기능 2] 길게 누르면 전화 걸기
                    let timer;
                    const start = () => {
                        timer = setTimeout(() => {
                            const phone = data[idx][1]; // 시트의 B열(전화번호)
                            if (phone && confirm(`${data[idx][0]}님께 전화하시겠습니까?\n(${phone})`)) {
                                location.href = 'tel:' + phone;
                            }
                        }, 700); // 0.7초 동안 누르면 실행
                    };
                    const cancel = () => clearTimeout(timer);

                    cell.addEventListener('touchstart', start);
                    cell.addEventListener('touchend', cancel);
                    cell.addEventListener('mousedown', start);
                    cell.addEventListener('mouseup', cancel);
                    cell.addEventListener('mouseleave', cancel);

                    tdName.appendChild(cell);
                }
                tr.appendChild(tdName);
            }
            table.appendChild(tr);
        }
        loadLocal();
    }

    function updateColor(el) {
        el.classList.remove('step-1', 'step-2');
        if(el.dataset.state == 1) el.classList.add('step-1');
        if(el.dataset.state == 2) el.classList.add('step-2');
    }

    function setTab(m) {
        nowMode = m;
        document.getElementById('t1').classList.toggle('active', m === 'class');
        document.getElementById('t2').classList.toggle('active', m === 'staff');
        render();
    }

    function saveCheck() {
        const states = {};
        document.querySelectorAll('.name-cell').forEach(c => states[c.id] = c.dataset.state);
        localStorage.setItem('att_store_v2', JSON.stringify(states));
        alert('저장되었습니다.');
    }

    function loadLocal() {
        const states = JSON.parse(localStorage.getItem('att_store_v2') || '{}');
        document.querySelectorAll('.name-cell').forEach(c => {
            if(states[c.id]) {
                c.dataset.state = states[c.id];
                updateColor(c);
            }
        });
    }

    function resetCheck() {
        if(confirm('초기화하시겠습니까?')) {
            document.querySelectorAll('.name-cell').forEach(c => {
                c.dataset.state = 0;
                updateColor(c);
            });
        }
    }

    window.onload = init;
</script>
</body>
</html>
